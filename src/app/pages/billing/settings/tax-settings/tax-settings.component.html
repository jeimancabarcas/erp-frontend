<mat-card class="cardWithShadow">
    <mat-card-content class="p-6">
        <div class="flex items-center flex-wrap justify-between mb-6">
            <div>
                <mat-card-title class="mb-1">Configuración Fiscal</mat-card-title>
                <mat-card-subtitle class="text-sm">
                    Gestiona los impuestos y retenciones aplicables.
                </mat-card-subtitle>
            </div>
            <button mat-flat-button color="primary" (click)="openTaxForm()">
                <span class="flex items-center gap-2">
                    <i-tabler name="plus" class="size-5"></i-tabler> Nuevo Impuesto
                </span>
            </button>
        </div>

        <div class="table-responsive">
            <table mat-table [dataSource]="taxes()" class="w-full">
                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef class="text-sm font-semibold"> Impuesto </th>
                    <td mat-cell *matCellDef="let tax" class="text-sm font-medium"> {{ tax.name }} </td>
                </ng-container>

                <ng-container matColumnDef="rate">
                    <th mat-header-cell *matHeaderCellDef class="text-sm font-semibold"> Tarifa / Porcentaje </th>
                    <td mat-cell *matCellDef="let tax" class="text-sm">
                        <span
                            class="px-2 py-1 rounded-md text-xs font-semibold {{ tax.rate > 0 ? 'bg-primary/10 text-primary' : 'bg-error/10 text-error' }}">
                            {{ tax.rate > 0 ? '+' : '' }}{{ tax.rate }}%
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="text-right text-sm font-semibold"> Acciones </th>
                    <td mat-cell *matCellDef="let tax" class="text-right">
                        <button mat-icon-button color="primary" matTooltip="Editar" (click)="openTaxForm(tax)">
                            <i-tabler name="edit" class="icon-18"></i-tabler>
                        </button>
                        <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="deleteTax(tax)">
                            <i-tabler name="trash" class="icon-18"></i-tabler>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="['name', 'rate', 'actions']"></tr>
                <tr mat-row *matRowDef="let row; columns: ['name', 'rate', 'actions'];"
                    class="hover:bg-hover-color transition-colors"></tr>
            </table>

            @if (isTaxesLoading()) {
            <app-table-loading message="Cargando configuración fiscal…"></app-table-loading>
            }
            @if (!isTaxesLoading() && taxes().length === 0) {
            <app-table-empty icon="receipt-tax" title="No hay impuestos"
                subtitle="Aún no has configurado ningún impuesto." buttonText="Crear Impuesto" (action)="openTaxForm()">
            </app-table-empty>
            }
        </div>
    </mat-card-content>
</mat-card>
